<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeladoria Natividade - Painel Operacional</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background-color: #f4f7f6; }
        #sidebar { width: 320px; background-color: #1e293b; color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 4px 0 10px rgba(0,0,0,0.1); z-index: 1000; }
        #sidebar h1 { font-size: 22px; margin-bottom: 5px; color: #38bdf8; }
        #sidebar p { font-size: 14px; color: #94a3b8; margin-top: 0; margin-bottom: 30px; }
        .card { background-color: #334155; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid; }
        .card.novo { border-color: #ef4444; }
        .card.andamento { border-color: #eab308; }
        .card.resolvido { border-color: #22c55e; }
        .card h3 { margin: 0 0 5px 0; font-size: 16px; }
        .card span { font-size: 24px; font-weight: bold; }
        #map-container { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>Zeladoria Natividade</h1>
        <p>Centro de Controle Operacional</p>

        <div class="card novo">
            <h3>🔴 Novos Chamados</h3>
            <span id="contador-novos">0</span>
        </div>

        <div class="card andamento">
            <h3>🟡 Em Andamento</h3>
            <span>0</span>
        </div>

        <div class="card resolvido">
            <h3>🟢 Resolvidos (Hoje)</h3>
            <span>0</span>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script>
        // Configuração do Mapa
        const latNatividade = -23.3764;
        const lngNatividade = -45.4431;
        const map = L.map('map').setView([latNatividade, lngNatividade], 13);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: '© Esri - Zeladoria Natividade'
        }).addTo(map);

        // --- INTEGRAÇÃO COM FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDpHbkothMTFftxJiysj-kYu0ar8ZiYSNo",
            authDomain: "zeladoria-natividade2.firebaseapp.com",
            databaseURL: "https://zeladoria-natividade2-default-rtdb.firebaseio.com",
            projectId: "zeladoria-natividade2",
            storageBucket: "zeladoria-natividade2.firebasestorage.app",
            messagingSenderId: "66356198629",
            appId: "1:66356198629:web:fa09801ac2a6bf9d60280c"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variável para contar os chamados
        let totalNovos = 0;

        // Fica "escutando" a pasta 'chamados' no banco de dados
        const chamadosRef = database.ref('chamados');
        chamadosRef.on('child_added', (snapshot) => {
            const dados = snapshot.val();

            // Quando chega um chamado novo, cria um pino no mapa com as coordenadas exatas
            const novoPino = L.marker([dados.latitude, dados.longitude]).addTo(map);
            
            // Cria o balão de texto do pino
            novoPino.bindPopup(`<b>🚨 ${dados.problema}</b><br>${dados.descricao}<br><i>Enviado pelo App</i>`);

            // Atualiza o contador na barra lateral
            totalNovos++;
            document.getElementById('contador-novos').innerText = totalNovos;
        });

    </script>
</body>
</html>
