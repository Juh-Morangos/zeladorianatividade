<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeladoria Natividade - App Cidadão</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        /* Estilo focado em ecrãs de telemóvel */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: white;
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
        }

        .form-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        button:active {
            background-color: #1d4ed8;
        }

        .btn-gps {
            background-color: #10b981;
        }
        
        #status-gps {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: -10px;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Zeladoria Natividade</h1>
            <p style="margin: 5px 0 0 0; font-size: 14px;">Reportar Problema</p>
        </div>

        <div class="form-container">
            
            <label>Tipo de Problema:</label>
            <select id="tipo-problema">
                <option value="Buraco na Estrada">Buraco na Estrada</option>
                <option value="Iluminação Pública">Iluminação Pública</option>
                <option value="Queda de Árvore">Queda de Árvore</option>
                <option value="Ponte Danificada">Ponte Danificada</option>
            </select>

            <label>Descrição (Opcional):</label>
            <textarea id="descricao" rows="3" placeholder="Ex: Perto do cruzamento principal..."></textarea>

            <label>Localização (Obrigatório):</label>
            <button type="button" class="btn-gps" onclick="obterLocalizacao()">📍 Obter Minha Localização</button>
            <p id="status-gps">Aguardando localização...</p>

            <button type="button" onclick="enviarChamado()">🚀 Enviar para a Prefeitura</button>
        </div>
    </div>

    <script>
        // --- INTEGRAÇÃO COM FIREBASE (As suas chaves!) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDpHbkothMTFftxJiysj-kYu0ar8ZiYSNo",
            authDomain: "zeladoria-natividade2.firebaseapp.com",
            databaseURL: "https://zeladoria-natividade2-default-rtdb.firebaseio.com",
            projectId: "zeladoria-natividade2",
            storageBucket: "zeladoria-natividade2.firebasestorage.app",
            messagingSenderId: "66356198629",
            appId: "1:66356198629:web:fa09801ac2a6bf9d60280c"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variáveis para guardar as coordenadas do utilizador
        let latitudeAtual = null;
        let longitudeAtual = null;

        // Função para pegar o GPS do navegador/telemóvel
        function obterLocalizacao() {
            const statusGps = document.getElementById('status-gps');
            statusGps.innerText = "A procurar satélites...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        latitudeAtual = position.coords.latitude;
                        longitudeAtual = position.coords.longitude;
                        statusGps.innerText = `✅ Localização capturada!`;
                        statusGps.style.color = "#10b981";
                    },
                    (error) => {
                        statusGps.innerText = "❌ Erro ao obter GPS. Permita o acesso.";
                        statusGps.style.color = "#ef4444";
                    }
                );
            } else {
                statusGps.innerText = "GPS não suportado neste dispositivo.";
            }
        }

        // Função para enviar os dados para o Firebase
        function enviarChamado() {
            if (latitudeAtual === null || longitudeAtual === null) {
                alert("Por favor, clique em 'Obter Minha Localização' antes de enviar!");
                return;
            }

            const tipo = document.getElementById('tipo-problema').value;
            const desc = document.getElementById('descricao').value;

            // Cria uma nova pasta (nó) dentro de 'chamados' com um ID único
            const novoChamadoRef = database.ref('chamados').push();
            
            // Envia os dados
            novoChamadoRef.set({
                problema: tipo,
                descricao: desc,
                latitude: latitudeAtual,
                longitude: longitudeAtual,
                data: new Date().toLocaleString()
            }).then(() => {
                alert("Sucesso! O seu chamado foi enviado para o painel da Prefeitura.");
                // Limpa o formulário
                document.getElementById('descricao').value = "";
                document.getElementById('status-gps').innerText = "Aguardando localização...";
                latitudeAtual = null;
                longitudeAtual = null;
            }).catch((error) => {
                alert("Erro ao enviar: " + error);
            });
        }
    </script>
</body>
</html>
